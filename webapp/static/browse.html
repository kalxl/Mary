<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse • Ary</title>
    <link rel="icon" href="/static/favicon_io/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon_io/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="/static/js/navbar.js?v=20260209-1"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --bg-card: #1e1e1e;
        --bg-card-hover: #252525;
        --border-subtle: #2a2a2a;
        --text-primary: #e8e8e8;
        --text-secondary: #a0a0a0;
        --text-tertiary: #6b6b6b;
        --accent: #78f09a;
        --accent-dark: #45c768;
        --accent-rgb: 120, 240, 154;
        --accent-hover: var(--accent-dark);
        --accent-dim: rgba(var(--accent-rgb), 0.12);
        --accent-dim-hover: rgba(var(--accent-rgb), 0.18);
        --tag-bg: rgba(var(--accent-rgb), 0.12);
        --tag-text: color-mix(in srgb, var(--accent) 60%, white);
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
        background: #111;
        color: var(--text-primary);
        line-height: 1.6;
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: none;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem clamp(1rem, 4vw, 4rem) 1rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      
      /* Header */
      header {
        position: relative;
        z-index: 10;
      }
      
      /* Browse Header */
      
      .browse-title {
        font-family: 'Outfit', sans-serif;
        font-size: 2.5rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        letter-spacing: -0.03em;
      }
      
      .browse-subtitle {
        color: var(--text-secondary);
        font-size: 1rem;
        margin-bottom: 2rem;
      }
      
      /* Search Bar */
      .search-container {
        position: relative;
        max-width: 100%;
        margin-bottom: 2rem;
      }
      
      .search-icon {
        position: absolute;
        left: 1.25rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-tertiary);
        pointer-events: none;
      }
      
      .search-input {
        width: 100%;
        padding: 1rem 1.25rem 1rem 3.5rem;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.2s ease;
      }
      
      .search-input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--bg-secondary);
      }
      
      .search-input::placeholder {
        color: var(--text-tertiary);
      }
      
      /* Filters Bar */
      .filters-bar {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 2rem;
      }
      
.filter-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 10px;
  padding: 0.5rem 0.75rem;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;

  /* 🔒 prevents compression on refresh */
  height: 36px;
}


.filter-group::after {
  content: "";
  position: absolute;
  right: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  border-width: 5px 5px 0 5px;
  border-style: solid;
  border-color: var(--text-tertiary) transparent transparent transparent;
  pointer-events: none;
}

      
      .filter-group:hover {
        background: var(--bg-card-hover);
        border-color: var(--accent);
      }
      
      .filter-group svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: var(--text-secondary);
      }
      
      .filter-label {
        font-size: 0.875rem;
        color: var(--text-secondary);
        font-weight: 500;
      }
      
      .filter-select {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  font-family: inherit;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  /* 🔒 lock layout */
  min-width: 110px;
  height: 24px;
  line-height: normal;
  padding-right: 1.5rem;
}

      
      .filter-select option {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      
      .sort-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent-dim);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 0.5rem 1rem;
        margin-left: auto;
        position: relative;
      }

      .sort-indicator::after {
        content: "";
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        border-width: 5px 5px 0 5px;
        border-style: solid;
        border-color: var(--accent) transparent transparent transparent;
        pointer-events: none;
      }

      .sort-indicator svg {
        width: 16px;
        height: 16px;
        color: var(--accent);
      }

      .sort-indicator .filter-select {
        width: 100%;
        min-width: 0;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        text-align: center;
        text-align-last: center;
        padding-right: 1.75rem;
        height: auto;
        line-height: 1.2;
      }
      
      .sort-indicator span {
        font-size: 0.875rem;
        color: var(--accent);
        font-weight: 600;
      }
      
      /* Results Info */
      .results-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      
      .results-count {
        font-size: 0.95rem;
        color: var(--text-secondary);
      }
      
      .view-toggle {
        display: flex;
        gap: 0.5rem;
        margin-left: auto;
      }

      /* scrollybolly: themed vertical scrollbar */
      html, body{
        scrollbar-width: thin;
        scrollbar-color: rgba(var(--accent-rgb),0.55) rgba(255,255,255,0.08);
      }
      html::-webkit-scrollbar, body::-webkit-scrollbar{width:10px}
      html::-webkit-scrollbar-track, body::-webkit-scrollbar-track{background:rgba(255,255,255,0.06);border-radius:999px}
      html::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb{background:linear-gradient(180deg, rgba(var(--accent-rgb),0.60), rgba(var(--accent-rgb),0.22));border-radius:999px;border:2px solid rgba(0,0,0,0.22)}
      html::-webkit-scrollbar-thumb:hover, body::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg, rgba(var(--accent-rgb),0.74), rgba(var(--accent-rgb),0.32))}
      
      .view-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      
      .view-btn:hover,
      .view-btn.active {
        background: var(--accent-dim);
        border-color: var(--accent);
      }
      
      .view-btn svg {
        width: 18px;
        height: 18px;
        color: var(--text-secondary);
      }
      
      .view-btn:hover svg,
      .view-btn.active svg {
        color: var(--accent);
      }
      
      /* Manga Grid */
      .manga-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.5rem;
        margin-bottom: 1rem;
      }

      @media (min-width: 1400px) {
        .manga-grid:not(.list-view) {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }
      
      .manga-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        overflow: visible;
        position: relative;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
      }
      
      .manga-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
      }
      
      .manga-cover {
        position: relative;
        width: 100%;
        overflow: visible;
      }

      .manga-cover-media {
        position: relative;
        width: 100%;
        border-radius: 16px;
        overflow: hidden;
        aspect-ratio: 3 / 4.2;
        background: var(--bg-secondary);
      }
      
      .manga-cover-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
      }
      
      .manga-cover-media:hover img {
        transform: scale(1.05);
      }

      .manga-grid:not(.list-view) .rating-badge {
        display: flex;
      }

      .manga-grid:not(.list-view) .rating-badge {
        top: 10px;
        right: 10px;
        padding: 0.25rem 0.55rem;
        font-size: 0.75rem;
      }

      .manga-grid:not(.list-view) .rating-badge svg {
        width: 12px;
        height: 12px;
      }

      .rating-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        background: rgba(12, 14, 20, 0.85);
        color: #fef3c7;
        font-weight: 600;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.25rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
      }

      .rating-badge svg {
        width: 14px;
        height: 14px;
        color: #fbbf24;
      }
      
      .manga-status-badge {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: rgba(12, 14, 20, 0.85);
        backdrop-filter: blur(8px);
        font-size: 0.75rem;
        font-weight: 600;
      }

      .manga-grid:not(.list-view) .manga-status-badge {
        padding: 0.25rem 0.6rem;
        font-size: 0.65rem;
        top: 0.6rem;
        left: 0.6rem;
      }

      .manga-grid.list-view .manga-status-badge {
        padding: 0.25rem 0.55rem;
        font-size: 0.65rem;
        top: 0.5rem;
        left: 0.5rem;
      }

      .library-status-wrapper {
        position: absolute;
        right: 0.65rem;
        bottom: 0.65rem;
        z-index: 5;
      }

      .library-status-btn {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        color: #9ca3af;
        border: 1px solid rgba(255, 255, 255, 0.16);
        cursor: pointer;
        user-select: none;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: filter 0.12s ease;
        padding: 0;
      }

      .library-status-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .library-status-btn.status-none {
        background: rgba(0, 0, 0, 0.55);
        color: #9ca3af;
      }
      .library-status-btn.status-reading {
        background: rgba(34, 197, 94, 0.18);
        color: #22c55e;
      }
      .library-status-btn.status-completed {
        background: rgba(59, 130, 246, 0.18);
        color: #3b82f6;
      }
      .library-status-btn.status-onhold {
        background: rgba(234, 179, 8, 0.2);
        color: #eab308;
      }
      .library-status-btn.status-dropped {
        background: rgba(248, 113, 113, 0.2);
        color: #ff3e3e;
      }
      .library-status-btn.status-plantoread {
        background: rgba(156, 163, 175, 0.2);
        color: rgb(173, 92, 253);
      }
      .library-status-btn:hover {
        filter: brightness(1.06);
      }

      .library-status-menu {
        display: none;
        position: fixed;
        width: 200px;
        background: rgba(15, 15, 15, 0.97);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        z-index: 9999;
      }

      .library-status-menu.open {
        display: block;
      }

      .library-status-option {
        width: 100%;
        text-align: left;
        padding: 0.55rem 0.9rem;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #d4d9d6;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.12s ease, color 0.12s ease;
      }

      .library-status-option:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .library-status-option[data-status="Reading"]:hover {
        background: rgba(34, 197, 94, 0.16);
        color: #bbf7d0;
      }
      .library-status-option[data-status="Completed"]:hover {
        background: rgba(59, 130, 246, 0.2);
        color: #dbeafe;
      }
      .library-status-option[data-status="On Hold"]:hover {
        background: rgba(234, 179, 8, 0.22);
        color: #fef9c3;
      }
      .library-status-option[data-status="Dropped"]:hover {
        background: rgba(248, 113, 113, 0.22);
        color: #fee2e2;
      }
      .library-status-option[data-status="Plan to Read"]:hover {
        background: rgba(168, 85, 247, 0.24);
        color: #f3e8ff;
      }

      .library-status-option.status-clear {
        color: #f06060;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .library-status-option.status-clear:hover {
        background: rgba(240, 96, 96, 0.12);
        color: #fee2e2;
      }

      .manga-grid.list-view .library-status-wrapper {
        right: 0.5rem;
        bottom: 0.5rem;
      }

      .manga-grid.list-view .library-status-btn {
        width: 30px;
        height: 30px;
      }

      .manga-grid.list-view .library-status-btn svg {
        width: 16px;
        height: 16px;
      }
      
      .status-ongoing {
        color: #4ade80;
      }
      
      .status-completed {
        color: #60a5fa;
      }
      
      .status-hiatus {
        color: #fbbf24;
      }
      
      .status-cancelled {
        color: #f87171;
      }
      
      .manga-info {
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
      }
      
      .manga-title {
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.3;
        color: var(--text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      
      .manga-description {
        font-size: 0.85rem;
        color: var(--text-secondary);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }
      
      .manga-stats {
        display: flex;
        gap: 1rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--border-subtle);
        margin-top: auto;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin: 0.35rem 0 0.75rem;
      }

      .tag {
        font-size: 0.7rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        background: var(--tag-bg);
        color: var(--tag-text);
        text-transform: capitalize;
      }
      
      .manga-stat {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
        color: var(--text-tertiary);
      }
      
      .manga-stat svg {
        width: 14px;
        height: 14px;
      }

      .manga-stat.list-rating {
        display: none;
      }

      .manga-grid.list-view .manga-stat.list-rating {
        display: flex;
      }
      
      /* List View */
      .manga-grid.list-view {
        grid-template-columns: 1fr;
      }

      @media (min-width: 1024px) {
        .manga-grid.list-view {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      
      .manga-grid.list-view .manga-card {
        flex-direction: row;
        align-items: stretch;
        gap: 1.25rem;
      }
      
      .manga-grid.list-view .manga-cover {
        width: 180px;
        aspect-ratio: 3 / 4.2;
        flex-shrink: 0;
      }
      
      .manga-grid.list-view .manga-info {
        padding: 1.5rem 1.5rem 1.5rem 0;
      }

      .manga-grid.list-view .manga-description {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        overflow: hidden;
      }

      @media (max-width: 820px) {
        .manga-grid.list-view {
          grid-template-columns: 1fr;
        }
        .manga-grid.list-view .manga-card {
          flex-direction: row;
          gap: 1rem;
        }
        .manga-grid.list-view .manga-cover {
          width: 100px;
          flex-shrink: 0;
        }
        .manga-grid.list-view .manga-info {
          padding: 0.5rem 0.5rem 0.5rem 0;
          gap: 0.25rem;
          min-width: 0;
          flex: 1;
        }
        .manga-grid.list-view .tag,
        .manga-grid.list-view .manga-stat span {
          font-size: 0.8rem;
        }
        .manga-grid.list-view .tag {
          padding: 0.15rem 0.5rem;
          font-size: 0.7rem;
        }
        .manga-grid.list-view .manga-title {
          font-size: 0.95rem;
          line-height: 1.25;
          -webkit-line-clamp: 2;
          line-clamp: 2;
        }
        .manga-grid.list-view .manga-description {
          font-size: 0.8rem;
          display: -webkit-box;
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 2;
          line-clamp: 2;
          overflow: hidden;
          width: 100%;
        }
        .manga-grid.list-view .manga-stats {
          gap: 0.6rem;
          margin-top: 0.1rem;
        }
        .manga-grid.list-view .manga-stat svg {
          width: 12px;
          height: 12px;
        }
      }

      .manga-grid.list-view .rating-badge {
        display: none;
      }

      
      /* Pagination */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.75rem;
        padding: 0.1rem 0 0.1rem;
      }
      
      .pagination-btn {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
        font-size: 1.25rem;
      }
      
      .pagination-btn:hover:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg-primary);
      }
      
      .pagination-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      
      .page-info {
        padding: 0.5rem 1rem;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary);
      }
      
      /* Loading & Empty States */
      .loading-state,
      .empty-state,
      .error-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem 1rem;
      }
      
      .loading-state {
        font-size: 1.1rem;
        color: var(--text-secondary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .loading-spinner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 3px solid rgba(var(--accent-rgb), 0.25);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
      }
      
      .empty-state {
        color: var(--text-tertiary);
      }
      
      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.3;
      }
      
      .error-state {
        color: #f87171;
      }
      
      /* Mobile Responsive */
      @media (max-width: 768px) {
        .browse-title {
          font-size: 2rem;
        }
        
        .filters-bar {
          gap: 0.5rem;
        }
        
        .filter-group {
          font-size: 0.8rem;
        }
        
        .sort-indicator {
          width: 100%;
          justify-content: center;
        }
        
        .manga-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 1rem;
        }
        
        .results-info {
          flex-direction: row;
          gap: 1rem;
          align-items: center;
          flex-wrap: nowrap;
        }

        .results-count{
          min-width: 0;
        }
        
        .manga-grid.list-view {
          grid-template-columns: 1fr;
        }
        
        .manga-grid.list-view .manga-cover {
          width: 100px;
        }
        
        .manga-grid.list-view .manga-info {
          padding: 1rem;
        }
      }
      
      @media (max-width: 600px) {
        .manga-grid:not(.list-view) {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .filters-bar {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 0.6rem;
        }
        .filter-group,
        .sort-indicator {
          width: 100%;
        }
        .filter-group {
          padding: 0.4rem 0.6rem;
          border-radius: 8px;
          gap: 0.4rem;
        }
        .filter-label,
        .filter-select {
          font-size: 0.8rem;
        }
        .sort-indicator {
          grid-column: 1 / -1;
          padding: 0.4rem 0.75rem;
          justify-content: space-between;
          min-height: 48px;
        }

        .sort-indicator .filter-select {
          text-align: left;
          text-align-last: left;
        }
      }

      @media (max-width: 360px) {
        .manga-grid:not(.list-view) {
          grid-template-columns: 1fr;
        }
      }
      
      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .manga-card {
        animation: fadeIn 0.4s ease backwards;
      }
      
      .manga-card:nth-child(1) { animation-delay: 0.05s; }
      .manga-card:nth-child(2) { animation-delay: 0.1s; }
      .manga-card:nth-child(3) { animation-delay: 0.15s; }
      .manga-card:nth-child(4) { animation-delay: 0.2s; }
      .manga-card:nth-child(5) { animation-delay: 0.25s; }
      .manga-card:nth-child(6) { animation-delay: 0.3s; }
    </style>
  </head>
  <body>

    <div class="container">

        <div class="search-container">

      <div class="manga-grid" id="browse-grid"></div>

      <div class="pagination">
        <button class="pagination-btn" id="prev-page">‹</button>
        <span class="page-info" id="page-indicator">Page 1</span>
        <button class="pagination-btn" id="next-page">›</button>

    <script>
      const navMount = document.getElementById("navbar-mount");
      const titleInput = document.getElementById("filter-title");
      const typeInput = document.getElementById("filter-type");
      const statusInput = document.getElementById("filter-status");
      const yearInput = document.getElementById("filter-year");
      const tagsInput = document.getElementById("filter-tags");
      const orderInput = document.getElementById("filter-order");
      const browseGrid = document.getElementById("browse-grid");
      const resultsCount = document.getElementById("results-count");
      const prevPageBtn = document.getElementById("prev-page");
      const nextPageBtn = document.getElementById("next-page");
      const pageIndicator = document.getElementById("page-indicator");
      const gridViewBtn = document.getElementById("grid-view");
      const listViewBtn = document.getElementById("list-view");

      let page = 1;
      const limit = 20;
      let currentView = 'grid';

      window.addEventListener("DOMContentLoaded", init);

      async function init() {
        await injectNavbar();
        readFiltersFromUrl();
        await loadResults();
        
        // Filter change listeners
        titleInput.addEventListener("input", debounce(() => {
          page = 1;
          writeFiltersToUrl();
          loadResults();
        }, 500));
        
        [typeInput, statusInput, yearInput, tagsInput, orderInput].forEach(input => {
          input.addEventListener("change", () => {
            page = 1;
            writeFiltersToUrl();
            loadResults();
          });
        });
        
        // Pagination
        prevPageBtn.addEventListener("click", () => {
          if (page === 1) return;
          page = Math.max(1, page - 1);
          writeFiltersToUrl();
          loadResults();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        nextPageBtn.addEventListener("click", () => {
          page += 1;
          writeFiltersToUrl();
          loadResults();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        // View toggle
        gridViewBtn.addEventListener("click", () => {
          currentView = 'grid';
          browseGrid.classList.remove('list-view');
          gridViewBtn.classList.add('active');
          listViewBtn.classList.remove('active');
        });
        
        listViewBtn.addEventListener("click", () => {
          currentView = 'list';
          browseGrid.classList.add('list-view');
          listViewBtn.classList.add('active');
          gridViewBtn.classList.remove('active');
        });
      }

      function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
          const later = () => {
            clearTimeout(timeout);
            func(...args);
          };
          clearTimeout(timeout);
          timeout = setTimeout(later, wait);
        };
      }

      async function injectNavbar() {
        try {
          const res = await fetch("/static/components/navbar.html", { cache: "no-store" });
          const html = await res.text();
          navMount.innerHTML = html;
          if (typeof initNavbar === 'function') initNavbar();
          navMount.querySelectorAll('[data-nav-link="browse"]').forEach((el) => el.classList.add("active"));
          if (typeof configureNavbarSearch === 'function') {
            configureNavbarSearch({
              onSubmit(q) {
                titleInput.value = q;
                page = 1;
                writeFiltersToUrl();
                loadResults();
              },
            });
          }
        } catch (err) {
          console.error('Failed to load navbar:', err);
        }
      }

      function readFiltersFromUrl() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("title")) titleInput.value = params.get("title");
        if (params.get("type")) typeInput.value = params.get("type");
        if (params.get("status")) statusInput.value = params.get("status");
        if (params.get("year")) yearInput.value = params.get("year");
        if (params.get("tags")) tagsInput.value = params.get("tags");
        if (params.get("order")) orderInput.value = params.get("order");
        if (params.get("page")) page = parseInt(params.get("page"), 10);
      }

      function writeFiltersToUrl() {
        const params = new URLSearchParams();
        if (titleInput.value) params.set("title", titleInput.value.trim());
        if (typeInput.value) params.set("type", typeInput.value);
        if (statusInput.value) params.set("status", statusInput.value);
        if (yearInput.value) params.set("year", yearInput.value);
        if (tagsInput.value) params.set("tags", tagsInput.value);
        if (orderInput.value) params.set("order", orderInput.value);
        if (page > 1) params.set("page", String(page));
        history.replaceState({}, "", params.toString() ? `?${params.toString()}` : window.location.pathname);
      }

      async function loadResults() {
        browseGrid.innerHTML = `
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading manga...</p>
          </div>`;
        prevPageBtn.disabled = page === 1;
        
        try {
          const params = buildSearchParams();
          const data = await fetchComickJson("/v1.0/search", params);
          const list = Array.isArray(data) ? data.map(normalizeBrowseComicCard).filter(Boolean) : [];
          renderCards(list);
          pageIndicator.textContent = `Page ${page}`;
          nextPageBtn.disabled = list.length < limit;
          resultsCount.textContent = `${list.length} comics shown`;
        } catch (err) {
          browseGrid.innerHTML = `<div class="error-state">Failed to load manga: ${err.message}</div>`;
        }
      }

      function buildSearchParams() {
        const params = {
          page,
          limit,
          sort: orderInput.value || "user_follow_count",
        };
        
        const title = titleInput.value.trim();
        if (title) {
          params.q = title;
          // When searching by title, we can only use sort parameter
          return params;
        }
        
        // When NOT searching by title, we can use these filters:
        const statusMap = {
          ongoing: 1,
          completed: 2,
          cancelled: 3,
          hiatus: 4,
        };
        
        if (statusInput.value && statusMap[statusInput.value]) {
          params.status = statusMap[statusInput.value];
        }

        const countryMap = {
          manga: "jp",
          manhwa: "kr",
          manhua: "cn",
        };
        const countryCode = countryMap[typeInput.value];
        if (countryCode) {
          params.country = [countryCode];
        }

        const yearValue = parseInt(yearInput.value, 10);
        if (!Number.isNaN(yearValue)) {
          params.from = yearValue;
          params.to = yearValue;
        }

        if (tagsInput.value) {
          params.genres = [tagsInput.value];
        }

        // Comick API uses demographic for content filtering
        const ratingValue = "safe,suggestive"; // Default safe content
        params["content_rating[]"] = ratingValue.split(',');

        return params;
      }

      function renderCards(items) {
        if (!items.length) {
          browseGrid.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📚</div>
              <div>No manga found. Try adjusting your filters.</div>
            </div>
          `;
          return;
        }
        
        browseGrid.innerHTML = items
          .map((item) => {
            const statusClass = item.statusKey ? `status-${item.statusKey}` : '';
            const statusText = item.statusLabel || '';
            const safeGenres = Array.isArray(item.genres) ? item.genres : [];
            const genreMarkup = safeGenres.slice(0, 3).map((genre) => `<span class="tag">${genre}</span>`).join("");
            
            return `
              <a class="manga-card" href="/series?slug=${encodeURIComponent(item.slug || item.id || "")}">
                <div class="manga-cover">
                  <div class="manga-cover-media">
                    <img src="${item.cover_url || "https://placehold.co/400x600/1a1a1a/666666?text=No+Cover"}" alt="${item.title}" loading="lazy" />
                    ${item.rating ? `
                      <div class="rating-badge">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M12 17.75 6.16 21l1.12-6.54L2 9.27l6.58-.96L12 2l3.42 6.31 6.58.96-4.76 5.19L17.84 21z"></path>
                        </svg>
                        <span>${formatStat(item.rating, true)}</span>
                      </div>
                    ` : ''}
                    ${statusText ? `<div class="manga-status-badge ${statusClass}">${statusText}</div>` : ''}
                  </div>

                  <div class="library-status-wrapper" data-series-hid="${String(item.seriesHid || "")}">
                    <button class="library-status-btn status-none" type="button" aria-label="Library status" data-series-hid="${String(item.seriesHid || "")}">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                    </button>
                    <div class="library-status-menu" role="menu">
                      <button type="button" class="library-status-option" data-status="Reading">Reading</button>
                      <button type="button" class="library-status-option" data-status="Completed">Completed</button>
                      <button type="button" class="library-status-option" data-status="On Hold">On Hold</button>
                      <button type="button" class="library-status-option" data-status="Dropped">Dropped</button>
                      <button type="button" class="library-status-option" data-status="Plan to Read">Plan to Read</button>
                      <button type="button" class="library-status-option status-clear" data-status="">Clear Status</button>
                    </div>
                  </div>
                </div>
                <div class="manga-info">
                  <h3 class="manga-title">${item.title}</h3>
                  <p class="manga-description">${truncateText(item.description)}</p>
                  ${genreMarkup ? `<div class="tag-row">${genreMarkup}</div>` : ''}
                  <div class="manga-stats">
                  <div class="manga-stat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                      <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>${formatStat(item.followers)}</span>
                  </div>
                    <div class="manga-stat">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 4h18"></path>
                        <path d="M3 12h18"></path>
                        <path d="M3 20h18"></path>
                      </svg>
                      <span>${item.chapterCount != null ? `${item.chapterCount}` : '—'}</span>
                    </div>
                    ${item.rating ? `
                      <div class="manga-stat list-rating">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M12 17.75 6.16 21l1.12-6.54L2 9.27l6.58-.96L12 2l3.42 6.31 6.58.96-4.76 5.19L17.84 21z"></path>
                        </svg>
                        <span>${formatStat(item.rating, true)}</span>
                      </div>
                    ` : ''}
                  </div>
                </div>
              </a>
            `;
          })
          .join("");

        initBrowseLibraryStatus(items);
      }

      function updateBrowseStatusButton(btn, status) {
        if (!btn) return;
        const normalized = (status || "").toLowerCase();
        btn.classList.remove(
          "status-none",
          "status-reading",
          "status-completed",
          "status-onhold",
          "status-dropped",
          "status-plantoread",
        );
        if (!normalized) {
          btn.classList.add("status-none");
          return;
        }
        if (normalized === "reading") btn.classList.add("status-reading");
        else if (normalized === "completed") btn.classList.add("status-completed");
        else if (normalized === "on hold") btn.classList.add("status-onhold");
        else if (normalized === "dropped") btn.classList.add("status-dropped");
        else if (normalized === "plan to read") btn.classList.add("status-plantoread");
        else btn.classList.add("status-none");
      }

      async function initBrowseLibraryStatus(items) {
        const getClient = typeof getSupabaseClient === "function" ? getSupabaseClient : null;
        if (!getClient) return;
        const client = getClient();
        if (!client) return;

        // When the card is transformed (hover), it creates a new containing block which breaks
        // position:fixed descendants. Portal menus to <body> while open to avoid clipping/stacking bugs.
        if (!window.__browseLibraryMenuPortal) {
          window.__browseLibraryMenuPortal = new WeakMap();
        }

        function portalMenuToBody(menu) {
          if (!menu || window.__browseLibraryMenuPortal.has(menu)) return;
          const parent = menu.parentNode;
          if (!parent) return;
          const placeholder = document.createComment('library-status-menu-placeholder');
          parent.insertBefore(placeholder, menu);
          document.body.appendChild(menu);
          window.__browseLibraryMenuPortal.set(menu, { parent, placeholder });
        }

        function restoreMenu(menu) {
          if (!menu) return;
          const entry = window.__browseLibraryMenuPortal.get(menu);
          if (!entry) return;
          try {
            entry.parent.insertBefore(menu, entry.placeholder);
            entry.parent.removeChild(entry.placeholder);
          } catch (_) {}
          window.__browseLibraryMenuPortal.delete(menu);
        }

        function closeAllMenus(exceptMenu = null) {
          document.querySelectorAll('.library-status-menu.open').forEach((m) => {
            if (exceptMenu && m === exceptMenu) return;
            m.classList.remove('open');
            restoreMenu(m);
          });
        }

        if (!window.__browseLibraryStatusDocListenerBound) {
          window.__browseLibraryStatusDocListenerBound = true;
          document.addEventListener('click', (e) => {
            // Close if click is outside any status wrapper
            const inside = e.target && typeof e.target.closest === 'function' && e.target.closest('.library-status-wrapper');
            if (inside) return;
            closeAllMenus(null);
          });
          window.addEventListener('resize', () => {
            closeAllMenus(null);
          });
          window.addEventListener('scroll', () => {
            closeAllMenus(null);
          }, { passive: true });
        }

        let userId = null;
        try {
          const { data: userResult } = await client.auth.getUser();
          userId = userResult?.user?.id || null;
        } catch (_) {}

        // Bind UI events
        document.querySelectorAll('.library-status-wrapper').forEach((wrap) => {
          const btn = wrap.querySelector('.library-status-btn');
          const menu = wrap.querySelector('.library-status-menu');
          if (!btn || !menu) return;

          btn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();

            // Close any other open menus first
            closeAllMenus(menu);

            const willOpen = !menu.classList.contains('open');
            if (!willOpen) {
              menu.classList.remove('open');
              restoreMenu(menu);
              return;
            }

            portalMenuToBody(menu);
            menu.classList.add('open');

            // Position menu centered above the button, clamped to viewport.
            const btnRect = btn.getBoundingClientRect();
            // Ensure the menu has layout
            const menuRect = menu.getBoundingClientRect();
            const menuWidth = menuRect.width || 200;
            const menuHeight = menuRect.height || 220;

            const padding = 8;
            let left = (btnRect.left + btnRect.width / 2) - menuWidth / 2;
            left = Math.max(padding, Math.min(left, window.innerWidth - menuWidth - padding));

            let top = btnRect.top - menuHeight - 10;
            if (top < padding) {
              // If not enough room above, place below
              top = btnRect.bottom + 10;
              if (top > window.innerHeight - menuHeight - padding) {
                top = Math.max(padding, window.innerHeight - menuHeight - padding);
              }
            }

            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
          });

          menu.querySelectorAll('[data-status]').forEach((opt) => {
            opt.addEventListener('click', async (e) => {
              e.preventDefault();
              e.stopPropagation();
              const seriesHid = btn.dataset.seriesHid || wrap.dataset.seriesHid || '';
              const status = opt.dataset.status || null;
              await saveBrowseLibraryStatus(client, userId, seriesHid, status, titleMap[seriesHid] || "");
              menu.classList.remove('open');
              restoreMenu(menu);
            });
          });
        });

        // Load statuses (if logged in)
        if (!userId) return;
        const titleMap = {};
        (items || []).forEach((it) => {
          const key = String(it?.seriesHid || "");
          if (key) titleMap[key] = it?.title || "";
        });

        const seriesHids = Object.keys(titleMap);
        if (!seriesHids.length) return;
        try {
          const { data, error } = await client
            .from('library_entries')
            .select('series_hid,status')
            .eq('user_id', userId)
            .in('series_hid', seriesHids);
          if (error) return;
          const map = {};
          (data || []).forEach((row) => {
            if (row?.series_hid) map[String(row.series_hid)] = row.status || null;
          });
          document.querySelectorAll('.library-status-btn').forEach((btn) => {
            const sid = btn.dataset.seriesHid;
            if (!sid) return;
            updateBrowseStatusButton(btn, map[sid] || null);
          });
        } catch (_) {}
      }

      async function saveBrowseLibraryStatus(client, userId, seriesHid, status, title = "") {
        if (!client || !seriesHid) return;
        try {
          if (!userId) {
            const loginModal = document.getElementById('login-modal');
            if (loginModal) {
              loginModal.classList.add('open');
              document.body.classList.add('nav-locked');
            }
            return;
          }

          if (!status) {
            const { error } = await client
              .from('library_entries')
              .delete()
              .eq('user_id', userId)
              .eq('series_hid', seriesHid);
            if (error) return;
            const btn = document.querySelector(`.library-status-btn[data-series-hid="${CSS.escape(seriesHid)}"]`);
            updateBrowseStatusButton(btn, null);
            return;
          }

          // Minimal payload like series page
          const payload = {
            user_id: userId,
            series_hid: seriesHid,
            title: title || "",
            status,
          };

          const { error } = await client
            .from('library_entries')
            .upsert(payload, { onConflict: 'user_id,series_hid' });
          if (error) return;
          const btn = document.querySelector(`.library-status-btn[data-series-hid="${CSS.escape(seriesHid)}"]`);
          updateBrowseStatusButton(btn, status);
        } catch (_) {}
      }

      function normalizeBrowseComicCard(raw) {
        if (!raw) return null;
        
        const title = raw.title || raw.name || "Untitled";
        const slug = raw.slug || raw.hid || String(raw.id || "");
        const seriesHid = raw.hid || raw.id || raw.slug || slug;

        let coverUrl = "https://placehold.co/400x600/1a1a1a/666666?text=No+Cover";
        if (raw.md_covers && raw.md_covers.length > 0) {
          coverUrl = `https://meo.comick.pictures/${raw.md_covers[0].b2key}`;
        } else if (raw.cover_url) {
          coverUrl = raw.cover_url;
        }

        const description = extractText(raw.desc || raw.description);

        const statusMap = {
          1: "ongoing",
          2: "completed",
          3: "cancelled",
          4: "hiatus"
        };
        const statusKey = statusMap[raw.status] ? statusMap[raw.status] : "";
        const statusLabel = statusKey ? statusKey.charAt(0).toUpperCase() + statusKey.slice(1) : "";

        const rawCountry = (raw.country || raw.md_comic_md_countries?.[0]?.md_countries?.code || "").toLowerCase();
        const typeLabel = rawCountry === "kr"
          ? "Manhwa"
          : rawCountry === "cn"
          ? "Manhua"
          : rawCountry === "jp"
          ? "Manga"
          : (raw.content_type ? raw.content_type.toUpperCase() : "Comic");

        const year = raw.year || extractYear(raw.released_at) || extractYear(raw.created_at) || null;

        const genres = [];
        if (Array.isArray(raw.md_comic_md_genres)) {
          genres.push(
            ...raw.md_comic_md_genres
              .map((g) => extractText(g.md_genres?.title || g.name))
              .filter(Boolean)
          );
        }
        if (Array.isArray(raw.genre_list)) {
          genres.push(...raw.genre_list.map((entry) => extractText(entry)).filter(Boolean));
        }

        const demographicMap = {
          1: "Shounen",
          2: "Shoujo",
          3: "Seinen",
          4: "Josei",
        };
        const demographicLabel = demographicMap[raw.demographic] || "";

        const stats = Array.isArray(raw.md_comic_md_stats) ? raw.md_comic_md_stats[0] : null;
        const legacyStats = Array.isArray(raw.statistics) ? raw.statistics[0] : null;
        const weightedScore = legacyStats?.weighted_score || legacyStats?.score;
        const followCount =
          raw.follow_count ||
          raw.followers ||
          raw.follows ||
          stats?.follow_count ||
          raw.user_follow_count ||
          raw.follow ||
          legacyStats?.follow_count ||
          legacyStats?.score_count ||
          0;

        return {
          id: raw.id,
          slug,
          seriesHid: String(seriesHid || ""),
          title,
          description,
          cover_url: coverUrl,
          statusKey,
          statusLabel,
          typeLabel,
          countryCode: rawCountry || null,
          year,
          genres: Array.from(new Set(genres.filter(Boolean))),
          demographicLabel,
          followers: Number.isFinite(Number(followCount)) ? Number(followCount) : 0,
          rating:
            parseFloat(
              raw.bayesian_rating ||
              raw.rating ||
              raw.average_rating ||
              stats?.score ||
              stats?.rating ||
              weightedScore
            ) || null,
          countryLabel:
            rawCountry === "kr"
              ? "KR"
              : rawCountry === "cn"
              ? "CN"
              : rawCountry === "jp"
              ? "JP"
              : rawCountry?.toUpperCase() || "",
          chapterCount: raw.last_chapter || raw.chapter_count || raw.chapters_count || stats?.chapter_count || null,
        };
      }

      function extractYear(value) {
        if (!value) return null;
        const match = String(value).match(/\d{4}/);
        return match ? match[0] : null;
      }

      function extractText(value) {
        if (!value) return "";
        if (typeof value === "string") return value;
        if (Array.isArray(value)) {
          for (const entry of value) {
            const result = extractText(entry);
            if (result) return result;
          }
          return "";
        }
        if (typeof value === "object") {
          for (const key of Object.keys(value)) {
            const result = extractText(value[key]);
            if (result) return result;
          }
        }
        return "";
      }

      function truncateText(value, limit = 120) {
        const safeValue = typeof value === "string" ? value.trim() : "";
        if (!safeValue) return "No description available";
        if (safeValue.length <= limit) return safeValue;
        return `${safeValue.slice(0, limit)}…`;
      }

      function formatStat(value, isRating = false) {
        if (isRating) {
          if (!value && value !== 0) return "N/A";
          const num = parseFloat(value);
          if (!Number.isFinite(num)) return "N/A";
          return num.toFixed(1);
        }
        if (!value && value !== 0) return "0";
        const num = parseFloat(value);
        if (!Number.isFinite(num)) return "0";
        if (num >= 1_000_000) return `${(num / 1_000_000).toFixed(1)}M`;
        if (num >= 1_000) return `${(num / 1_000).toFixed(1)}K`;
        return `${Math.round(num)}`;
      }

      async function fetchComickJson(path, params = {}) {
        const url = new URL("/api/comick/raw", window.location.origin);
        url.searchParams.set("path", path);
        Object.entries(params).forEach(([key, value]) => {
          if (value === undefined || value === null) return;
          if (Array.isArray(value)) {
            value.forEach((entry) => url.searchParams.append(key, entry));
          } else {
            url.searchParams.set(key, value);
          }
        });

        const res = await fetch(url.toString(), {
          headers: { Accept: "application/json" },
        });
        if (!res.ok) {
          throw new Error(`Comick API error: ${res.status}`);
        }
        return res.json();
      }

      function buildComickUrl(path, params = {}) {
        const base = path.startsWith("http") ? path : `https://api.comick.dev${path}`;
        const url = new URL(base);
        Object.entries(params).forEach(([key, value]) => {
          if (value === undefined || value === null) return;
          if (Array.isArray(value)) {
            value.forEach((entry) => url.searchParams.append(key, entry));
          } else {
            url.searchParams.set(key, value);
          }
        });
        return url.toString();
      }
    </script>
