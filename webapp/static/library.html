      async function loadEntryCollections(hid){
        try{
          if(!entryCollectionsEl){
            return;
          }
          entryCollectionsEl.innerHTML='<div class="modal-note">Loading…</div>';
          entryCollectionsCache=[];
          entryCollectionMembership = new Set();
          setEntryNote('');

          const client = await waitForSupabaseClient(6000);
          if(!client){
            setEntryNote('Supabase client not available.', true);
            entryCollectionsEl.innerHTML='';
            return;
          }
          const {data:userRes, error:userErr} = await client.auth.getUser();
          const user = userRes?.user || null;
          if(userErr || !user){
            setEntryNote('Sign in to edit bookmarks.', true);
            entryCollectionsEl.innerHTML='';
            return;
          }

          const {data:cols, error:colsErr} = await client
            .from('collections')
            .select('id,title')
            .eq('user_id', user.id)
            .order('created_at', {ascending:false});
          if(colsErr){
            setEntryNote(`Failed to load collections: ${String(colsErr.message||colsErr)}`.trim(), true);
            entryCollectionsEl.innerHTML='';
            return;
          }
          entryCollectionsCache = Array.isArray(cols) ? cols : [];
          const ids = entryCollectionsCache.map((c)=>c.id).filter(Boolean);
          if(!ids.length){
            entryCollectionsEl.innerHTML = '<div class="modal-note">No collections yet.</div>';
            return;
          }

          const {data:items, error:itemsErr} = await client
            .from('collection_items')
            .select('collection_id')
            .in('collection_id', ids)
            .eq('series_hid', hid);
          if(!itemsErr && Array.isArray(items)){
            items.forEach((it)=>{ if(it?.collection_id) entryCollectionMembership.add(String(it.collection_id)); });
          }

          const iconSvg = `<svg class="collection-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h5l2 2h11v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`;
          const plusSvg = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>`;
          const minusSvg = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>`;
          entryCollectionsEl.innerHTML = entryCollectionsCache.map((c)=>{
            const inCol = entryCollectionMembership.has(String(c.id));
            return `
              <div class="collection-row" data-col-row="1">
                <div class="collection-left">
                  ${iconSvg}
                  <div class="collection-title" title="${escapeHtml(String(c.title||'Untitled'))}">${escapeHtml(String(c.title||'Untitled'))}</div>
                </div>
                <button class="collection-action ${inCol?'active':''}" type="button" data-col-id="${String(c.id)}" aria-label="Toggle collection">
                  ${inCol ? minusSvg : plusSvg}
                </button>
              </div>`;
          }).join('');
        }catch(e){
          try{ console.warn('loadEntryCollections failed', e); }catch(_){ }
          try{
            if(entryCollectionsEl) entryCollectionsEl.innerHTML='';
            setEntryNote(`Failed to load collections: ${String(e?.message||e||'')}`.trim(), true);
          }catch(_){ }
        }
      }

      async function saveEntryModal(){
        try{
          if(!entryModalHid) return;
          if(entrySaveBtn){
            entrySaveBtn.disabled=true;
            const span=entrySaveBtn.querySelector('span');
            if(span) span.textContent='Saving…';
          }
          setEntryNote('');

          const client = await waitForSupabaseClient(6000);
          if(!client){
            setEntryNote('Supabase client not available.', true);
            return;
          }
          const {data:userRes, error:userErr} = await client.auth.getUser();
          const user = userRes?.user || null;
          if(userErr || !user){
            setEntryNote('Sign in to edit bookmarks.', true);
            return;
          }

          const payload = {
            status: String(entrySelectedStatus||'').trim() || null,
          };
          payload.rating = entrySelectedRating===null ? null : entrySelectedRating;
          payload.notes = (entryNotesEl?.value || '').trim() || null;

          const {data:updated, error:upErr} = await client
            .from('library_entries')
            .update(payload)
            .eq('user_id', user.id)
            .eq('series_hid', entryModalHid)
            .select('series_hid,title,status,rating,progress,notes')
            .maybeSingle();
          if(upErr){
            setEntryNote(`Save failed: ${String(upErr.message||upErr)}`.trim(), true);
            return;
          }

          try{
            const idx = libraryEntries.findIndex((e)=>String(e?.series_hid||'')===entryModalHid);
            if(idx !== -1){
              libraryEntries[idx] = {...libraryEntries[idx], ...(updated||payload)};
            }
          }catch(_){ }

          // Collections membership sync
          try{
            if(entryCollectionsEl && entryCollectionsCache.length){
              const desired = new Set();
              entryCollectionsEl.querySelectorAll('button.collection-action[data-col-id]').forEach((btn)=>{
                const id=btn.getAttribute('data-col-id');
                if(btn.classList.contains('active') && id) desired.add(String(id));
              });
              const existing = new Set(entryCollectionMembership);
              const toAdd = Array.from(desired).filter((id)=>!existing.has(id));
              const toRemove = Array.from(existing).filter((id)=>!desired.has(id));

              const title = libraryEntries.find((e)=>String(e?.series_hid||'')===entryModalHid)?.title || entryModalHid;
              const cover = entryCoverEl?.src || null;

              if(toAdd.length){
                const ins = toAdd.map((collectionId)=>({
                  collection_id: collectionId,
                  series_hid: entryModalHid,
                  series_title: title,
                  series_cover: cover,
                }));
                await client.from('collection_items').insert(ins);
              }
              if(toRemove.length){
                await client.from('collection_items')
                  .delete()
                  .in('collection_id', toRemove)
                  .eq('series_hid', entryModalHid);
              }
              entryCollectionMembership = desired;
            }
          }catch(_){ }

          setEntryNote('Saved.', false);
          setTimeout(()=>{ try{ if(entryNoteEl && entryNoteEl.textContent==='Saved.') entryNoteEl.hidden=true; }catch(_){ } }, 1200);
          closeEntryModal();
        }catch(e){
          setEntryNote(`Save failed: ${String(e?.message||e||'')}`.trim(), true);
        } finally {
          try{
            if(entrySaveBtn){
              const span=entrySaveBtn.querySelector('span');
              if(span) span.textContent='Save';
              entrySaveBtn.disabled=false;
            }
          }catch(_){ }
        }
      }

      async function handleClearLibrary() {
        const confirmed = window.confirm(
          "This will remove all series from your Ary library. This cannot be undone.\n\nDo you want to continue?"
        );
        if (!confirmed) return;

        const getClient = typeof getSupabaseClient === "function" ? getSupabaseClient : null;
        if (!getClient) return;
        const client = getClient();
        if (!client) return;

        try {
          const { data: userResult, error: userError } = await client.auth.getUser();
          if (userError || !userResult?.user) return;
          const user = userResult.user;

          const { error } = await client
            .from("library_entries")
            .delete()
            .eq("user_id", user.id);
          if (error) {
            console.warn("handleClearLibrary delete error", error.message || error);
            return;
          }
          libraryEntries = [];
          renderLibrary();
        } catch (err) {
          console.warn("handleClearLibrary failed", err);
        }
      }

      async function loadLibraryOnce() {
        const client = await waitForSupabaseClient(9000);
        if (!client) {
          if (libraryCount) libraryCount.textContent = "Supabase client not available.";
          const hadCachedGrid = Boolean(libraryGrid && libraryGrid.innerHTML && libraryGrid.innerHTML.trim().length);
          if (!hadCachedGrid) {
            if (libraryGrid) libraryGrid.innerHTML = "";
          }
          return false;
        }

        const hadCachedGrid = Boolean(libraryGrid && libraryGrid.innerHTML && libraryGrid.innerHTML.trim().length);

        try {
          const params = new URLSearchParams(window.location.search);
          const userParamRaw = (params.get("user") || "").trim();

          const { data: userResult } = await client.auth.getUser();
          const viewer = userResult?.user || null;

          viewingUserId = null;
          viewingHandle = null;
          isReadOnlyView = false;
          accountIsPrivate = false;

          if (userParamRaw) {
            const resolved = await resolveUserIdentifier(client, userParamRaw);
            if (!resolved?.id) {
              isReadOnlyView = true;
              applyReadOnlyUi();
              if (libraryTitleEl) libraryTitleEl.textContent = "Library";
              if (librarySubtitleEl) librarySubtitleEl.textContent = "User not found or profile is private.";
              if (libraryCount) libraryCount.textContent = "No library to show.";
              if (emptyState) emptyState.style.display = "";
              if (libraryGrid) libraryGrid.innerHTML = "";
              return true;
            }
            viewingUserId = resolved.id;
            viewingHandle = resolved.handle || userParamRaw;
            isReadOnlyView = !viewer || viewer.id !== viewingUserId;
          } else {
            if (!viewer) {
              isReadOnlyView = true;
              applyReadOnlyUi();
              if (libraryTitleEl) libraryTitleEl.textContent = "Library";
              if (librarySubtitleEl) librarySubtitleEl.textContent = "Add ?user=<username> to view a public library.";
              if (libraryCount) libraryCount.textContent = "Sign in to see your library.";
              if (emptyState) emptyState.style.display = "";
              if (libraryGrid) libraryGrid.innerHTML = "";
              return true;
            }
            viewingUserId = viewer.id;
            viewingHandle = viewer.user_metadata?.preferred_username || viewer.user_metadata?.username || null;
            isReadOnlyView = false;
          }

          try{
            if(viewingUserId && isReadOnlyView){
              const {data:p, error:pe} = await client.from('profiles').select('is_private').eq('id', viewingUserId).maybeSingle();
              accountIsPrivate = !!(p?.is_private);
              if(pe) accountIsPrivate = false;
            } else {
              accountIsPrivate = false;
            }
          }catch(_){
            accountIsPrivate = false;
          }

          if(accountIsPrivate && isReadOnlyView){
            applyReadOnlyUi();
            if (libraryTitleEl) libraryTitleEl.textContent = "Library";
            if (librarySubtitleEl) librarySubtitleEl.textContent = "";
            if (libraryCount) libraryCount.textContent = "";
            if (privateWall) privateWall.classList.remove('hidden');
            if (emptyState) emptyState.style.display = "none";
            if (libraryGrid) libraryGrid.innerHTML = "";
            return true;
          } else {
            if (privateWall) privateWall.classList.add('hidden');
          }

          applyReadOnlyUi();

          if (libraryTitleEl) {
            libraryTitleEl.textContent = isReadOnlyView ? "Library" : "My Library";
          }
          if (librarySubtitleEl) {
            if (isReadOnlyView && viewingHandle) librarySubtitleEl.textContent = `${viewingHandle}'s bookmarks on Ary.`;
            else librarySubtitleEl.textContent = "All the series you've bookmarked across Ary.";
          }

          const { data, error } = await client
            .from("library_entries")
            .select(
              "series_hid, title, status, chapters_read, rating, origination, last_read_at, synonyms, mal_url, anilist_url, mangaupdates_url"
            )
            .eq("user_id", viewingUserId)
            .order("updated_at", { ascending: false });

          if (error) {
            console.warn("loadLibrary error", error.message || error);
            isReadOnlyView = true;
            applyReadOnlyUi();
            if (hadCachedGrid) {
              if (librarySubtitleEl) librarySubtitleEl.textContent = "Unable to refresh library right now.";
              if (libraryCount) libraryCount.textContent = "Showing cached library.";
              // Keep cached UI instead of wiping + flickering.
            } else {
              if (librarySubtitleEl) librarySubtitleEl.textContent = "Unable to load library right now.";
              if (libraryCount) libraryCount.textContent = "Failed to load library.";
              if (emptyState) emptyState.style.display = "";
              if (libraryGrid) libraryGrid.innerHTML = "";
            }
            return false;
          }

          libraryEntries = Array.isArray(data) ? data : [];
          renderLibrary();
          try { saveLibraryToCache(getLibraryCacheKey()); } catch (_) {}
          return true;
        } catch (err) {
          console.warn("loadLibrary failed", err);
          if (!hadCachedGrid) {
            if (libraryCount) libraryCount.textContent = "Failed to load library.";
          } else {
            if (libraryCount) libraryCount.textContent = "Showing cached library.";
          }
          return false;
        }
      }

      function applyReadOnlyUi() {
        try{
          const shouldWall = !!(accountIsPrivate && isReadOnlyView);
          const toggle = (el, hide) => {
            if(!el) return;
            if(hide){ el.hidden = true; el.style.display = 'none'; }
            else { el.hidden = false; el.style.display = ''; }
          };

          const searchWrap = document.querySelector('.library-search-wrap');
          const filtersBar = document.querySelector('.filters-bar');
          const summaryBar = document.querySelector('.library-summary');
          toggle(searchWrap, shouldWall);
          toggle(filtersBar, shouldWall);
          toggle(summaryBar, shouldWall);

          if(privateWall) privateWall.classList.toggle('hidden', !shouldWall);

          if(shouldWall){
            if(emptyState) emptyState.style.display = 'none';
            if(libraryGrid) libraryGrid.innerHTML = '';
          }
        }catch(_){ }
      }

      function looksLikeUuid(value) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(
          String(value || '')
        );
      }

      async function resolveUserIdentifier(client, ident) {
        const raw = String(ident || '').trim();
        if (!raw) return null;

        if (looksLikeUuid(raw)) {
          try {
            const { data, error } = await client
              .from('profiles')
              .select('username')
              .eq('id', raw)
              .maybeSingle();
            if (error) return { id: raw, handle: raw };
            const handle = data?.username || raw;
            return { id: raw, handle };
          } catch (_) {
            return { id: raw, handle: raw };
          }
        }

        try {
          const { data, error } = await client
            .from('profiles')
            .select('id,username')
            .eq('username', raw)
            .limit(1);
          const row = Array.isArray(data) ? data[0] : null;
          if (error || !row?.id) return null;
          return { id: row.id, handle: row.username || raw };
        } catch (_) {
          return null;
        }
      }

      async function waitForSupabaseClient(ms) {
        const start = Date.now();
        while (Date.now() - start < (ms || 0)) {
          try {
            if (typeof getSupabaseClient === 'function') {
              const c = getSupabaseClient();
              if (c) return c;
            }
          } catch (_) {}
          await new Promise((r) => setTimeout(r, 150));
        }
        try {
          return typeof getSupabaseClient === 'function' ? getSupabaseClient() : null;
        } catch (_) {
          return null;
        }
      }

      function escapeHtml(input){
        const str = String(input ?? '');
        return str
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderLibrary() {
        if (!libraryGrid || !libraryCount || !emptyState) return;

        try{
          if(privateWall) privateWall.classList.toggle('hidden', !accountIsPrivate);
          if(accountIsPrivate){
            if(libraryGrid) libraryGrid.innerHTML = '';
            if(emptyState) emptyState.style.display = 'none';
            if(libraryCount) libraryCount.textContent = 'Account private.';
            return;
          }
        }catch(_){ }

        const counts = {
          all: libraryEntries.length,
          reading: 0,
          completed: 0,
          onhold: 0,
          dropped: 0,
          plantoread: 0,
        };

        libraryEntries.forEach((entry) => {
          const s = (entry.status || "").toLowerCase();
          if (s === "reading") counts.reading += 1;
          else if (s === "completed") counts.completed += 1;
          else if (s === "on hold") counts.onhold += 1;
          else if (s === "dropped") counts.dropped += 1;
          else if (s === "plan to read") counts.plantoread += 1;
        });

        if (statusTabs) {
          const setCount = (selector, value) => {
            const el = statusTabs.querySelector(selector);
            if (el) el.textContent = String(value);
          };
          setCount('.tab-count-all', counts.all);
          setCount('.tab-count-reading', counts.reading);
          setCount('.tab-count-completed', counts.completed);
          setCount('.tab-count-onhold', counts.onhold);
          setCount('.tab-count-dropped', counts.dropped);
          setCount('.tab-count-plantoread', counts.plantoread);
        }

        const norm = (v) => String(v || "").trim().toLowerCase();

        const filtered = libraryEntries.filter((entry) => {
          if (currentStatus !== "all" && norm(entry.status) !== norm(currentStatus)) return false;
          if (searchQuery) {
            const haystack = (entry.title || "").toLowerCase();
            if (!haystack.includes(searchQuery)) return false;
          }
          return true;
        });

        filtered.sort((a, b) => {
          if (currentSort === 'newest') {
            const av = Date.parse(a?.last_read_at || '') || 0;
            const bv = Date.parse(b?.last_read_at || '') || 0;
            return bv - av;
          }
          const at = String(a?.title || '').toLowerCase();
          const bt = String(b?.title || '').toLowerCase();
          const cmp = at.localeCompare(bt);
          return currentSort === 'za' ? -cmp : cmp;
        });

        const total = libraryEntries.length;
        const label =
          currentStatus === "all"
            ? `Showing ${filtered.length} of ${total} series`
            : `Showing ${filtered.length} ${currentStatus.toLowerCase()} series`;
        libraryCount.textContent = label;

        if (!filtered.length) {
          libraryGrid.innerHTML = "";
          emptyState.style.display = "";
          return;
        }

        emptyState.style.display = "none";

        libraryGrid.innerHTML = filtered
          .map((entry) => {
            const title = entry.title || "Untitled";
            const rawStatus = entry.status || "";
            const statusLower = rawStatus.toLowerCase();
            let statusKey = "none";
            if (statusLower === "reading") statusKey = "reading";
            else if (statusLower === "completed") statusKey = "completed";
            else if (statusLower === "on hold") statusKey = "onhold";
            else if (statusLower === "dropped") statusKey = "dropped";
            else if (statusLower === "plan to read") statusKey = "plantoread";
            const seriesKey = entry.series_hid || "";
            const href = seriesKey ? `/series?slug=${encodeURIComponent(seriesKey)}` : "#";
            const chipLabel = rawStatus || "No Status";

            return `
              <a class="library-card" data-hid="${seriesKey}" href="${href}">
                <div class="library-card-cover">
                  ${isReadOnlyView ? '' : `<button class="library-card-menu" data-hid="${seriesKey}" type="button" aria-label="More options" title="More options"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>`}
                  <img data-series-hid="${seriesKey}" src="https://placehold.co/400x560/111111/222222" alt="${title}" loading="lazy" decoding="async" width="400" height="560" />
                </div>
                <div class="library-status-chip status-${statusKey}">${chipLabel}</div>
                <div class="library-card-title">${title}</div>
              </a>
            `;
          })
          .join("");

        try{
          libraryGrid.querySelectorAll('.library-card-menu').forEach((btn)=>{
            if(btn.dataset.bound) return;
            btn.dataset.bound='1';
            btn.addEventListener('click', (e)=>{
              try{ e.preventDefault(); e.stopPropagation(); }catch(_){ }
              const hid = btn.getAttribute('data-hid') || '';
              if(!hid) return;
              openEntryModal(hid);
            });
          });
        }catch(_){ }

        scheduleUpdateLibraryCovers(filtered);
      }

      function scheduleUpdateLibraryCovers(entries){
        try{
          if(coverUpdateTimer) clearTimeout(coverUpdateTimer);
          coverUpdateTimer = setTimeout(()=>{
            coverUpdateTimer = null;
            updateLibraryCovers(entries);
          }, 140);
        }catch(_){
          updateLibraryCovers(entries);
        }
      }

      function updateLibraryCovers(entries) {
        if (!window.fetchComickJson || !libraryGrid) return;
        entries.forEach((entry) => {
          ensureCoverForEntry(entry);
        });
      }

      async function ensureChapterCountForEntry(entry){
        try{
          const hid = entry?.series_hid;
          if(!hid) return;
          if(libraryChapterCountCache[hid] !== undefined) {
            return;
          }
          if(libraryChapterCountInflight[hid]) return;

          libraryChapterCountInflight[hid] = (async ()=>{
            let comic = null;
            try{
              const detail = await fetchComickJson(`/comic/${hid}`);
              comic = detail?.comic || detail || null;
            } catch (_) {
              comic = null;
            }

            if (!comic) {
              try {
                const title = entry?.title || hid;
                const search = await fetchComickJson("/v1.0/search", { q: title, limit: 1 });
                const first = Array.isArray(search) ? search[0] : null;
                if (first) comic = first;
              } catch (_) {
                comic = null;
              }
            }

            const total = comic?.last_chapter || comic?.chapter_count || comic?.chapters_count || null;
            libraryChapterCountCache[hid] = total;
          })();

          await libraryChapterCountInflight[hid];
        } catch (_) {
        } finally {
          try{ delete libraryChapterCountInflight[hid]; }catch(_){ }
        }
      }

      async function ensureCoverForEntry(entry) {
        const hid = entry.series_hid;
        if (!hid) return;
        const cached = libraryCoverCache[hid];
        const img = libraryGrid.querySelector(`img[data-series-hid="${hid}"]`);
        if (cached) {
          if (img) img.src = cached;
          return;
        }
        if (libraryCoverInflight[hid]) {
          try { await libraryCoverInflight[hid]; } catch (_) {}
          const after = libraryCoverCache[hid];
          if (after && img) img.src = after;
          return;
        }
        try {
          libraryCoverInflight[hid] = (async ()=>{
            let comic = null;
            try {
              const detail = await fetchComickJson(`/comic/${hid}`);
              comic = detail?.comic || detail || null;
            } catch (_) {
              comic = null;
            }

            if (!comic) {
              try {
                const title = entry.title || hid;
                const search = await fetchComickJson("/v1.0/search", { q: title, limit: 1 });
                const first = Array.isArray(search) ? search[0] : null;
                if (first) comic = first;
              } catch (_) {
                // ignore and fall through to placeholder
              }
            }

            const coverKey =
              comic && (comic.cover_url || (Array.isArray(comic.md_covers) && comic.md_covers[0]?.b2key));
            let url = "https://placehold.co/400x560?text=No+Cover";
            if (coverKey) {
              url = coverKey.startsWith("http") ? coverKey : `https://meo.comick.pictures/${coverKey}`;
            }
            libraryCoverCache[hid] = url;
          })();

          await libraryCoverInflight[hid];
          const resolved = libraryCoverCache[hid];
          if (resolved && img) img.src = resolved;
        } catch (err) {
          console.warn("ensureCoverForEntry failed", err);
          libraryCoverCache[hid] = "https://placehold.co/400x560?text=No+Cover";
        } finally {
          try { delete libraryCoverInflight[hid]; } catch (_) {}
        }
      }

      if(entryCollectionsEl && !entryCollectionsEl.dataset.bound){
        entryCollectionsEl.dataset.bound='1';
        entryCollectionsEl.addEventListener('click', (e)=>{
          const btn = e.target?.closest?.('button.collection-action[data-col-id]');
          if(!btn) return;
          try{ e.preventDefault(); }catch(_){ }
          const isActive = btn.classList.toggle('active');
          btn.innerHTML = isActive
            ? '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>';
        });
      }
      
      function normalizeStatus(type) {
        const t = (type || "").toLowerCase();
        if (!t) return null;
        if (t === "reading") return "Reading";
        if (t === "completed") return "Completed";
        if (t === "on hold" || t === "on_hold") return "On Hold";
        if (t === "dropped") return "Dropped";
        if (t === "plan to read" || t === "plan_to_read" || t === "ptw") return "Plan to Read";
        return null;
      }

      function csvEscape(value) {
        const s = String(value ?? "");
        if (s.includes('"') || s.includes(",") || s.includes("\n")) {
          return '"' + s.replace(/"/g, '""') + '"';
        }
        return s;
      }

      async function exportLibraryCsv() {
        if (!libraryEntries.length) {
          await loadLibrary();
        }
        const rows = [];
        rows.push("hid,title,type,rating,origination,read,last_read,synonyms,mal,anilist,mangaupdates");
        libraryEntries.forEach((entry) => {
          const hid = entry.series_hid || "";
          const title = entry.title || "";
          const type = entry.status || "";
          const rating = entry.rating ?? "";
          const origination = entry.origination || "";
          const read = entry.chapters_read ?? "";
          const lastRead = entry.last_read_at || "";
          const synonyms = entry.synonyms || "";
          const mal = entry.mal_url || "";
          const anilist = entry.anilist_url || "";
          const mu = entry.mangaupdates_url || "";
          const cols = [
            hid,
            title,
            type,
            rating,
            origination,
            read,
            lastRead,
            synonyms,
            mal,
            anilist,
            mu,
          ].map(csvEscape);
          rows.push(cols.join(","));
        });

        const csv = rows.join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "AryComic.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      async function handleImportFile(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const { header, rows } = parseCsv(text);
          if (!header || !rows.length) return;

          const index = {};
          header.forEach((name, i) => {
            index[name.trim()] = i;
          });

          const getCol = (row, key) => {
            const idx = index[key];
            return idx != null ? row[idx] || "" : "";
          };

          const getClient = typeof getSupabaseClient === "function" ? getSupabaseClient : null;
          if (!getClient) return;
          const client = getClient();
          if (!client) return;

          const { data: userResult, error: userError } = await client.auth.getUser();
          if (userError || !userResult?.user) return;
          const user = userResult.user;

          const payload = [];
          rows.forEach((row) => {
            const hid = getCol(row, "hid").trim();
            if (!hid) return;
            const title = getCol(row, "title") || hid;
            const type = normalizeStatus(getCol(row, "type"));
            const ratingRaw = getCol(row, "rating").trim();
            const rating = ratingRaw ? parseInt(ratingRaw, 10) : null;
            const readRaw = getCol(row, "read").trim();
            const chaptersRead = readRaw ? parseInt(readRaw, 10) : null;
            const rowPayload = {
              user_id: user.id,
              series_hid: hid,
              title,
              chapters_read: chaptersRead,
            };
            if (type) {
              rowPayload.status = type;
            }
            if (rating !== null && !Number.isNaN(rating)) {
              rowPayload.rating = rating;
            }
            payload.push(rowPayload);
          });

          if (!payload.length) return;

          const { error } = await client
            .from("library_entries")
            .upsert(payload);
          if (error) {
            console.warn("import upsert error", error.message || error);
            return;
          }
          importInput.value = "";
          await loadLibrary();
        } catch (err) {
          console.warn("handleImportFile failed", err);
        }
      }

      function parseCsv(text){
        const rows = [];
        const lines = String(text || '').split(/\r?\n/);
        for (const line of lines) {
          if (!line.trim()) continue;
          let current = "";
          let inQuotes = false;
          for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inQuotes) {
              if (ch === '"') {
                if (i + 1 < line.length && line[i + 1] === '"') {
                  current += '"';
                  i++;
                } else {
                  inQuotes = false;
                }
              } else {
                current += ch;
              }
            } else {
              if (ch === '"') {
                inQuotes = true;
              } else if (ch === ',') {
                row.push(current);
                current = "";
              } else {
                current += ch;
              }
            }
          }
        
          row.push(current);
          rows.push(row);
        }
        if (!rows.length) return { header: null, rows: [] };
        const [header, ...rest] = rows;
        return { header, rows: rest };
      }

      const scrollTopBtn = document.getElementById('scroll-top-btn');
      if(scrollTopBtn && !scrollTopBtn.dataset.bound){
        scrollTopBtn.dataset.bound = '1';
        const applyScrollTopVisible = ()=>{
          try{
            const y = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
            scrollTopBtn.style.display = y > 320 ? 'flex' : 'none';
          }catch(_){ }
        };
        applyScrollTopVisible();
        window.addEventListener('scroll', applyScrollTopVisible, { passive: true });
        scrollTopBtn.addEventListener('click', ()=>{
          try{ window.scrollTo({ top: 0, behavior: 'smooth' }); }catch(_){ window.scrollTo(0,0); }
        });
      }
    </script>
