<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionary - Read Manga Online</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="components/navbar.css">
    <link rel="stylesheet" href="components/footer.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            padding-top: 100px;
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 40%, #0a4d5c 70%, #06b6d4 100%);
            background-attachment: fixed;
        }
        
        .chapter-card-image {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Homepage Content -->
    <div class="homepage">
        
        <!-- Hero Banner -->
        <section class="hero-banner">
            <div class="hero-slider" id="hero-slider">
                <!-- Filled by JS -->
            </div>
            <div class="hero-dots" id="hero-dots">
                <!-- Filled by JS -->
            </div>
        </section>

        <!-- Main Grid: Latest Chapters + Trending -->
        <div class="homepage-grid">
            
            <!-- Latest Chapters -->
            <section class="latest-section">
                <div class="section-title">
                    <div class="section-icon">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <div>
                        <h2>Latest Chapters</h2>
                        <p class="section-subtitle">Recently updated chapters</p>
                    </div>
                </div>
                
                <div class="latest-grid" id="latest-grid">
                    <!-- Filled by JS -->
                </div>

                <!-- Pagination -->
                <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 30px;">
                    <button class="carousel-btn" id="prev-page" style="width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.3); color: var(--cyan); border-radius: 50%;">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span id="page-info" style="display: flex; align-items: center; color: var(--text-gray); font-weight: 600; min-width: 80px; justify-content: center;">Page 1</span>
                    <button class="carousel-btn" id="next-page" style="width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.3); color: var(--cyan); border-radius: 50%;">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>

            <!-- Trending Sidebar -->
            <aside class="trending-sidebar">
                <div class="trending-title">
                    <div class="trending-icon">
                        <i class="fas fa-fire"></i>
                    </div>
                    <div>
                        <h3>Trending</h3>
                        <p class="section-subtitle">Most popular right now</p>
                    </div>
                </div>
                
                <div class="trending-list" id="trending-list">
                    <!-- Filled by JS -->
                </div>
            </aside>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config/supabase.js"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
